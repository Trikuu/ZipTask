{% extends "base.html" %}
{% block title %}Post Task - ZipTask{% endblock %}
{% block content %}
<section class="page-section">
    <div class="container">
        <div class="form-panel mx-auto">
            <h1 class="h3 fw-bold mb-3">Post a Task</h1>
            <form method="post" class="js-loading-form">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input class="form-control" name="title" maxlength="160" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="5" required></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Budget in INR</label>
                        <input class="form-control" type="number" name="budget" min="1" step="0.01" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        <input class="form-control" name="location" required>
                    </div>
                </div>
                <button class="btn gradient-btn w-100" data-loading-text="Posting...">Post Task</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
