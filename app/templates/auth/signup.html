{% extends "base.html" %}
{% block title %}Signup - ZipTask{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card mx-auto">
            <h1 class="h3 fw-bold mb-3">Create your ZipTask account</h1>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Full name</label>
                    <input class="form-control" name="full_name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input class="form-control" name="phone" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" minlength="8" required>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="accept_privacy" id="acceptPrivacy" required>
                    <label class="form-check-label" for="acceptPrivacy">I accept the <a href="{{ url_for('main.privacy_policy') }}">Privacy Policy</a>.</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="accept_terms" id="acceptTerms" required>
                    <label class="form-check-label" for="acceptTerms">I accept the <a href="{{ url_for('main.terms') }}">Terms & Conditions</a>.</label>
                </div>
                <button class="btn gradient-btn w-100" type="submit">Signup</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
