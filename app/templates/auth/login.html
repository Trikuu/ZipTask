{% extends "base.html" %}
{% block title %}Login - ZipTask{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card mx-auto">
            <h1 class="h3 fw-bold mb-3">Login to ZipTask</h1>
            <form method="post" class="js-loading-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" required>
                </div>
                <div class="d-flex justify-content-end mb-3">
                    <a class="fw-bold text-decoration-none" href="{{ url_for('auth.forgot_password') }}">Forgot Password?</a>
                </div>
                <button class="btn gradient-btn w-100" type="submit" data-loading-text="Signing in...">Login</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
