{% extends "base.html" %}
{% block title %}Forgot Password - ZipTask{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card mx-auto">
            <p class="eyebrow text-purple mb-1">Account recovery</p>
            <h1 class="h3 fw-bold mb-3">Reset your password</h1>
            <p class="text-muted">Enter your registered email and we will send a secure reset link that expires in 30 minutes.</p>
            <form method="post" class="js-loading-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" name="email" required>
                </div>
                <button class="btn gradient-btn w-100" type="submit" data-loading-text="Sending...">Send Reset Link</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
