{% extends "base.html" %}
{% block title %}Reset Password - ZipTask{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card mx-auto">
            <p class="eyebrow text-purple mb-1">Secure reset</p>
            <h1 class="h3 fw-bold mb-3">Create a new password</h1>
            <form method="post" class="js-loading-form">
                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input class="form-control" type="password" name="password" minlength="8" maxlength="12" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,12}" required>
                    <div class="form-text">8-12 characters with 1 uppercase letter, 1 number, and 1 special character.</div>
                </div>
                <button class="btn gradient-btn w-100" type="submit" data-loading-text="Resetting...">Reset Password</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
